name: Build birsvd
description: Build birsvd distributions, install the wheel, and verify import.

runs:
  using: composite
  steps:
    - name: Install build frontend
      shell: bash
      run: |
        python -m pip install --upgrade pip
        python -m pip install build

    - name: Build source and wheel distributions
      shell: bash
      run: python -m build

    - name: Install built wheel
      shell: bash
      run: python -m pip install dist/*.whl

    - name: Check installed pakcages
      shell: bash
      run: |
        python -m pip list -v
        ls -R /opt/hostedtoolcache/Python/3.*/x64/lib/python3.*/site-packages

    - name: Check import
      shell: bash
      working-directory: /tmp
      run: python -c "import sys; print(sys.path)"

    - name: Check import
      shell: bash
      working-directory: /tmp
      run: python -c "import birsvd; print(birsvd.__file__)"
